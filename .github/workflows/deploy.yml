name: Deploy website

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: otobonik-sgp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz --delete --exclude='.git' --exclude='media/' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ \
            ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/var/otobonik/otobonik-landing-page/

      - name: Build and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/otobonik/otobonik-landing-page
            make build
            make down
            make flush-static
            make up
